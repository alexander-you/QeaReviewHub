---
title: "Feature Request"
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to QEA Review Hub!
        Please fill in as much detail as you can. Feature requests with clear use cases are prioritised first.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the solution does this relate to?
      options:
        - Web Resource / UI
        - AI / Copilot
        - Power Automate Flows
        - Plugins / Data Access
        - Data Model / Tables
        - Localisation
        - Deployment / Setup
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point. What can't you do today?
      placeholder: "As a manager, I can't see previous reviews for an agent when starting a new session..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical — blocking adoption
        - High — would significantly improve my workflow
        - Medium — nice to have
        - Low — minor improvement
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or references to similar tools — anything that helps.
    validations:
      required: false
